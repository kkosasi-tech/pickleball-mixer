# Build and deploy the Vite app to GitHub Pages.
# After pushing: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Public site path (root vs /repo/)
        id: base
        shell: bash
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [[ "$REPO" == "${OWNER}.github.io" ]]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
            echo "Using site root (username.github.io repo)."
          else
            echo "path=/${REPO}/" >> "$GITHUB_OUTPUT"
            echo "Using project path: /${REPO}/"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install and build
        env:
          GITHUB_PAGES_BASE: ${{ steps.base.outputs.path }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
